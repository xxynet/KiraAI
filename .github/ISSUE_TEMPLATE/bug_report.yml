name: Bug report
description: Create a report to help us improve KiraAI
title: "[Bug]: "
labels:
  - bug
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible so we can reproduce and fix the issue quickly.

  - type: input
    id: summary
    attributes:
      label: Short description
      description: Briefly describe the bug
      placeholder: The application crashes when I ...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KiraAI version
      description: The version of KiraAI you are using
      placeholder: e.g. v1.2.3

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Your operating system, Python version, and any other relevant details
      placeholder: e.g. Windows 11, Python 3.11

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant logs or error messages.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the problem here.
